<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TopperTimer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>⏱ TopperTimer</h1>

<div class="nav">

<button id="loginBtn">Login with Google</button>

</div>

</header>

<section class="hero">

<h2>Focus. Study. Become a Topper.</h2>

<p>Track your study time and climb the leaderboard.</p>

</section>

<div class="main">

<div class="timer-box">

<h2>Study Timer</h2>

<div id="time">00:00</div>

<div class="buttons">

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

</div>

</div>

<div class="leaderboard">

<h2>Leaderboard</h2>

<ul id="leaderboardList"></ul>

</div>

</div>

<footer>

<p>© 2026 TopperTimer</p>

</footer>

<script type="module" src="app.js"></script>

</body>
</html>
