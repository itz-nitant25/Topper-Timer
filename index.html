<!DOCTYPE html>
<html>

<head>

<title>TopperTimer</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

</head>

<body>

<div class="sidebar">

<h2>TopperTimer</h2>

<button id="login">Login with Google</button>
<button id="logout">Logout</button>

</div>

<div class="main">

<h1>Study Timer</h1>

<h2 id="timer">25:00</h2>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

<h3 id="streak">🔥 Streak: 0</h3>

<h2>Leaderboard</h2>

<table>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Minutes</th>
</tr>

<tbody id="leaderboard"></tbody>

</table>

<h2>Study Battle</h2>

<input id="friend" placeholder="Friend Name">

<button onclick="battle()">Start Battle</button>

<div id="battleResult"></div>

<h2>AI Study Planner</h2>

<input id="subject" placeholder="Subject">

<button onclick="plan()">Generate Plan</button>

<div id="planResult"></div>

</div>

<script src="app.js"></script>

</body>

</html>
